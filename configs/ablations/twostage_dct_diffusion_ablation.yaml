seed: 0
gpu_index: 1
num_candidates: 10
humanmac_multimodal_threshold: 7.0

preprocessing:
  input_n: 70
  output_n: 30
  stride: 5
  time_interp: null
  window_norm: null
  eval_batch_mult: 1

dataset: assembly
action_filter: "pick_up_screwd"

runtime:
  output_root: /home/fagnelli/diffusion_hands/results
  aggregate_csv: /home/fagnelli/diffusion_hands/results/twostage_dct_diffusion_ablations.csv

data_roots:
  assembly: /mnt/pve/Turing-Storage2/AssemblyHands/assembly101-download-scripts/data_our/

twostage_ablation_base: &twostage_ablation_base
  config_path: ../models/twostage_dct_diffusion.yaml
  base_model: twostage_dct_diffusion
  enabled: true
  options:
    save_eval_samples: false
  defaults:
    save_eval_examples: false

