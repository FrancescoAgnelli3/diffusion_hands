  twostage_gaussian_kernel_noise:
    <<: *twostage_ablation_base
    notes: "ablation: replace Laplacian heat-kernel hand covariance with a Gaussian spectral kernel"
    defaults:
      save_eval_examples: false
      twostage_node_covariance_type: gaussian_kernel

  twostage_empirical_temporal_mean_covariance:
    <<: *twostage_ablation_base
    notes: "ablation: replace graph-derived hand covariance with train-set empirical covariance from temporally averaged future poses"
    defaults:
      save_eval_examples: false
      twostage_node_covariance_type: empirical_temporal_mean

  twostage_empirical_heat_kernel_covariance:
    <<: *twostage_ablation_base
    notes: "ablation:replace the graph Laplacian with train-set empirical covariance and apply the same spectral heat kernel"
    defaults:
      save_eval_examples: false
      twostage_node_covariance_type: empirical_heat_kernel

  twostage_unnormalized_laplacian:
    <<: *twostage_ablation_base
    notes: "ablation: use the unnormalized graph Laplacian instead of the normalized Laplacian in the theoretical covariance"
    defaults:
      save_eval_examples: false
      twostage_graph_laplacian_normalized: false
      twostage_node_covariance_type: laplacian_heat_kernel

