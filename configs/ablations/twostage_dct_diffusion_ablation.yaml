seed: 0
gpu_index: 0
num_candidates: 10
humanmac_multimodal_threshold: 0.5

preprocessing:
  input_n: 70
  output_n: 30
  stride: 5
  time_interp: null
  window_norm: null
  eval_batch_mult: 1

dataset: assembly
action_filter: "pick_up_screwd"

runtime:
  output_root: /home/agnelli/projects/diffusion_hands/results
  aggregate_csv: /home/agnelli/projects/diffusion_hands/results/twostage_dct_diffusion_ablations.csv

twostage_ablation_base: &twostage_ablation_base
  config_path: ../models/twostage_dct_diffusion.yaml
  base_model: twostage_dct_diffusion
  enabled: true

models:
  twostage_base:
    <<: *twostage_ablation_base
    notes: "baseline: exact configs/models/twostage_dct_diffusion.yaml (k_low=60, coarse conditioning on, history conditioning off, coarse unfrozen)"

  # Conditioning ablations (baseline has coarse=true, history=false)
  twostage_no_coarse_cond:
    <<: *twostage_ablation_base
    notes: "ablation: remove coarse prediction conditioning (history-only conditioning)"
    defaults:
      twostage_cond_use_history: true
      twostage_cond_use_coarse: false

  twostage_hist_plus_coarse:
    <<: *twostage_ablation_base
    notes: "ablation: add history conditioning alongside coarse conditioning"
    defaults:
      twostage_cond_use_history: true

  # Coarse-stage training ablations (baseline has freeze_coarse=false)
  twostage_freeze_coarse:
    <<: *twostage_ablation_base
    notes: "ablation: freeze coarse model during diffusion stage"
    defaults:
      twostage_freeze_coarse: true

  twostage_lowpass_coarse_gt:
    <<: *twostage_ablation_base
    notes: "ablation: supervise coarse stage with low-pass-only target"
    defaults:
      twostage_coarse_target_lowpass_only: true

  # Denoiser / diffusion noise ablations
  twostage_dropout_01:
    <<: *twostage_ablation_base
    notes: "ablation: set twostage denoiser dropout to 0.1"
    defaults:
      twostage_dropout: 0.1

  twostage_isotropic_noise:
    <<: *twostage_ablation_base
    notes: "ablation: replace hand-structured diffusion noise with isotropic noise"
    defaults:
      twostage_mobility_palm_var: 1.0
      twostage_mobility_depth1_var: 1.0
      twostage_mobility_depth2_var: 1.0
      twostage_mobility_depth3plus_var: 1.0
      twostage_graph_edge_strength: 0.0
      twostage_graph_two_hop_strength: 0.0
      twostage_covariance_jitter: 0.0

  # DCT coarse budget ablations around baseline k_low=60
  twostage_klow_40:
    <<: *twostage_ablation_base
    notes: "ablation: reduce low-frequency DCT budget from 60 to 40"
    defaults:
      twostage_k_low: 40

  twostage_klow_80:
    <<: *twostage_ablation_base
    notes: "ablation: increase low-frequency DCT budget from 60 to 80"
    defaults:
      twostage_k_low: 80
