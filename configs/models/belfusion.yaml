model: belfusion
enabled: true
train:
  epochs: 20
  early_stopping:
    enabled: true
    patience: 15
    min_delta: 0.0001
    warmup: 5
    monitor: train_loss
defaults:
  seed: 0
  data:
    n_nodes: 21
  model:
    hidden_dim: 512
    latent_dim: 128
  train:
    epochs: 20
    batch_size: 256
    lr: 0.0002
    kl_weight: 0.001
    l1_weight: 1.0
    num_workers: 0
  eval:
    batch_size: 256
